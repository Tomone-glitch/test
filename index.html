<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务看板</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #ebecf0;
  color: #172b4d;
  min-height: 100vh;
  padding: 20px 24px;
}
.header {
  max-width: 1100px; margin: 0 auto 24px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.header h1 { color: #172b4d; font-size: 1.5rem; white-space: nowrap; }
.add-bar { display: flex; gap: 8px; flex: 1; min-width: 260px; }
.add-bar input {
  flex: 1; padding: 10px 14px; border: none; border-radius: 6px;
  font-size: 14px; outline: none; min-width: 0;
}
.add-bar input:focus { box-shadow: 0 0 0 2px rgba(255,255,255,.4); }
.add-bar button {
  padding: 10px 18px; background: #fff; color: #1a73e8;
  border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: background .15s;
}
.add-bar button:hover { background: #e8f0fe; }
.columns { display: flex; gap: 16px; max-width: 1100px; margin: 0 auto; }
.column {
  flex: 1; min-width: 0; background: #e2e4e6; border-radius: 8px;
  padding: 10px; display: flex; flex-direction: column;
  transition: box-shadow .2s, background .2s;
}
.column.drag-over { background: #c8d6e5; box-shadow: 0 0 0 3px #fff, 0 0 0 5px rgba(255,255,255,.5); }
.column-header {
  font-size: 14px; font-weight: 700; padding: 6px 10px 10px;
  color: #5e6c84; text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.column-header .count { font-size: 13px; color: #6b778c; }
.card-list { flex: 1; min-height: 60px; display: flex; flex-direction: column; gap: 6px; }
.card {
  background: #fff; border-radius: 6px; padding: 10px 10px 10px 14px;
  box-shadow: 0 1px 2px rgba(9,30,66,.15); cursor: grab;
  display: flex; align-items: center; gap: 8px; user-select: none;
  transition: box-shadow .15s; position: relative;
}
.card:hover { box-shadow: 0 2px 6px rgba(9,30,66,.2); }
.card.dragging { opacity: .4; box-shadow: 0 4px 12px rgba(9,30,66,.25); }
.card .text { flex: 1; font-size: 14px; line-height: 1.4; word-break: break-word; }
.card .del-btn {
  flex-shrink: 0; width: 24px; height: 24px; border: none; background: none;
  color: #6b778c; font-size: 18px; line-height: 1; cursor: pointer;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.card .del-btn:hover { background: #ebecf0; color: #172b4d; }
.card .move-btns { display: flex; gap: 3px; margin-left: 4px; }
.card .move-btn {
  flex-shrink: 0; width: 22px; height: 22px; border: none;
  background: #dfe1e6; color: #6b778c; font-size: 12px; cursor: pointer;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.card .move-btn:hover { background: #c1c7d0; }
.empty-hint { text-align: center; color: #a5adba; font-size: 13px; padding: 20px 0; }

/* drag ghost */
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  opacity: .85; transform: rotate(2deg);
  background: #fff; border-radius: 6px; padding: 10px 14px;
  box-shadow: 0 8px 24px rgba(9,30,66,.35);
  font-size: 14px; max-width: 260px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

@media (max-width: 700px) {
  body { padding: 12px 8px; }
  .columns { flex-direction: column; gap: 10px; }
  .column-header { font-size: 13px; }
  .card { padding: 8px 8px 8px 10px; }
  .card .text { font-size: 13px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>任务看板</h1>
  <div class="add-bar">
    <input id="taskInput" type="text" placeholder="输入新任务..." maxlength="300">
    <button id="addBtn">添加</button>
  </div>
</div>

<div class="columns">
  <div class="column" data-col="todo">
    <div class="column-header"><span>待办</span><span class="count"></span></div>
    <div class="card-list" id="list-todo"></div>
  </div>
  <div class="column" data-col="in-progress">
    <div class="column-header"><span>进行中</span><span class="count"></span></div>
    <div class="card-list" id="list-in-progress"></div>
  </div>
  <div class="column" data-col="done">
    <div class="column-header"><span>已完成</span><span class="count"></span></div>
    <div class="card-list" id="list-done"></div>
  </div>
</div>

<script>
const COLUMNS = ['todo', 'in-progress', 'done'];
const COL_NAMES = { 'todo': '待办', 'in-progress': '进行中', 'done': '已完成' };

let tasks = [];
let dragInfo = null; // { id, el, ghostEl, startX, startY, offsetX, offsetY, touchId }

function load() {
  try { tasks = JSON.parse(localStorage.getItem('kanban-tasks') || '[]'); }
  catch { tasks = []; }
}
function save() { localStorage.setItem('kanban-tasks', JSON.stringify(tasks)); }

function render() {
  COLUMNS.forEach(col => {
    const list = document.getElementById('list-' + col);
    const items = tasks.filter(t => t.column === col);
    const columnEl = list.closest('.column');
    columnEl.querySelector('.count').textContent = items.length;
    if (!items.length) {
      list.innerHTML = '<div class="empty-hint">暂无任务</div>';
      return;
    }
    list.innerHTML = items.map(t => `
      <div class="card" draggable="true" data-id="${t.id}">
        <span class="text">${escapeHtml(t.text)}</span>
        <div class="move-btns">
          ${COLUMNS.filter(c => c !== col).map(c =>
            `<button class="move-btn" data-to="${c}" title="移至${COL_NAMES[c]}">${c === 'done' ? '✓' : c === 'todo' ? '←' : '→'}</button>`
          ).join('')}
        </div>
        <button class="del-btn" title="删除">&times;</button>
      </div>
    `).join('');
  });
}

function escapeHtml(s) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return s.replace(/[&<>"']/g, c => map[c]);
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  tasks.push({ id: Date.now(), text, column: 'todo' });
  save(); render(); input.value = '';
}

function moveTask(id, toCol) {
  const t = tasks.find(t => t.id === id);
  if (t) t.column = toCol;
  save(); render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

// ── Mouse drag ──────────────────────────────────────────────
document.addEventListener('dragstart', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', card.dataset.id);
  dragInfo = { id: +card.dataset.id, el: card };
});

document.addEventListener('dragend', e => {
  const card = e.target.closest('.card');
  if (card) card.classList.remove('dragging');
  dragInfo = null;
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
});

COLUMNS.forEach(col => {
  const columnEl = document.querySelector(`.column[data-col="${col}"]`);
  columnEl.addEventListener('dragover', e => { e.preventDefault(); columnEl.classList.add('drag-over'); });
  columnEl.addEventListener('dragleave', () => columnEl.classList.remove('drag-over'));
  columnEl.addEventListener('drop', e => {
    e.preventDefault();
    columnEl.classList.remove('drag-over');
    const id = +e.dataTransfer.getData('text/plain');
    if (id) moveTask(id, col);
  });
});

// Allow drop on card-list directly too
document.querySelectorAll('.card-list').forEach(list => {
  list.addEventListener('dragover', e => { e.preventDefault(); list.closest('.column').classList.add('drag-over'); });
  list.addEventListener('drop', e => {
    e.preventDefault();
    const col = list.closest('.column').dataset.col;
    list.closest('.column').classList.remove('drag-over');
    const id = +e.dataTransfer.getData('text/plain');
    if (id) moveTask(id, col);
  });
});

// ── Touch drag ──────────────────────────────────────────────
let ghostEl = null;

function createGhost(text) {
  const el = document.createElement('div');
  el.className = 'drag-ghost';
  el.textContent = text;
  return el;
}

function getColumnUnder(x, y) {
  const cols = document.querySelectorAll('.column');
  for (const col of cols) {
    const r = col.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return col;
  }
  return null;
}

document.addEventListener('touchstart', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  // Don't interfere with move/delete buttons
  if (e.target.closest('button')) return;

  const touch = e.touches[0];
  dragInfo = {
    id: +card.dataset.id,
    el: card,
    startX: touch.clientX,
    startY: touch.clientY,
    offsetX: touch.clientX - card.getBoundingClientRect().left,
    offsetY: touch.clientY - card.getBoundingClientRect().top,
    moved: false,
    touchId: touch.identifier
  };
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (!dragInfo) return;
  const touch = Array.from(e.touches).find(t => t.identifier === dragInfo.touchId);
  if (!touch) return;

  const dx = touch.clientX - dragInfo.startX;
  const dy = touch.clientY - dragInfo.startY;

  if (!dragInfo.moved && Math.abs(dx) < 6 && Math.abs(dy) < 6) return;

  e.preventDefault();

  if (!dragInfo.moved) {
    dragInfo.moved = true;
    dragInfo.el.classList.add('dragging');
    ghostEl = createGhost(dragInfo.el.querySelector('.text').textContent);
    document.body.appendChild(ghostEl);
  }

  ghostEl.style.left = (touch.clientX - dragInfo.offsetX) + 'px';
  ghostEl.style.top = (touch.clientY - dragInfo.offsetY) + 'px';

  const col = getColumnUnder(touch.clientX, touch.clientY);
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  if (col) col.classList.add('drag-over');
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!dragInfo) return;
  const touch = Array.from(e.changedTouches).find(t => t.identifier === dragInfo.touchId);
  if (!touch && dragInfo.moved) { cleanupDrag(); return; }
  if (!touch) { dragInfo = null; return; }

  if (dragInfo.moved) {
    const col = getColumnUnder(touch.clientX, touch.clientY);
    if (col) moveTask(dragInfo.id, col.dataset.col);
    cleanupDrag();
  }
  dragInfo = null;
});

function cleanupDrag() {
  if (dragInfo && dragInfo.el) dragInfo.el.classList.remove('dragging');
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
}

// ── Click handlers ──────────────────────────────────────────
document.addEventListener('click', e => {
  const delBtn = e.target.closest('.del-btn');
  if (delBtn) {
    const card = delBtn.closest('.card');
    if (card && confirm('确定删除这个任务吗？')) deleteTask(+card.dataset.id);
    return;
  }
  const moveBtn = e.target.closest('.move-btn');
  if (moveBtn) {
    const card = moveBtn.closest('.card');
    if (card) moveTask(+card.dataset.id, moveBtn.dataset.to);
  }
});

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ── Init ────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
